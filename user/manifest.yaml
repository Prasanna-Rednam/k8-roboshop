apiVersion: v1
kind: ConfigMap
metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: user
data:
  REDIS_HOST: "redis"
  MONGO_URL: "mongodb://<MONGODB-SERVER-IP-ADDRESS>:27017/users"
  MONGO: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: backend
    component: user
spec:
  replicas: 1
  selector:
    # using these labels replica set selects the pod
    matchLabels:
      project: roboshop
      tier: backend
      component: user
  # This is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: user
    spec:
      containers:
      - name: user
        image: rednamprasanna/user:1.4.0
        imagePullPolicy: Always #safe to pull everytime, there may be image with same version rebuild and pushed 

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        readinessProbe:
        # httpGet:
        #   path: /healthz
        #   port: liveness-port
          tcpSocket:
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
          initialDelaySeconds: 15
        livenessProbe:
          httpGet:
            path: /healthz
            port: liveness-port
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
         - configMapRef:
             name: user
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: user
spec:
  selector:
    #lables are used as selectors
     project: roboshop
     tier: backend
     component: user
  ports:
    - protocol: TCP
      port: 27017 #service port
      targetPort: 27017 # cantainer port